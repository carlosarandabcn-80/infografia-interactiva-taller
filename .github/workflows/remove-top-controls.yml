name: Remove top controls and publish

on:
  push:
    branches: [main]
    paths: [.github/workflows/remove-top-controls.yml]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove top control bar while keeping accessibility
        shell: python
        run: |
          from pathlib import Path

          page = Path('index.html')
          html = page.read_text(encoding='utf-8')
          controls = '<div class="tools"><button class="btn ghost" id="cmdBtn" type="button">Comando Ctrl K</button><button class="btn" id="themeBtn" type="button">Tema</button><button class="btn" id="densityBtn" type="button">Densidad</button><button class="btn" id="presentBtn" type="button">Presentar</button><button class="btn" id="printBtn" type="button">Exportar PDF</button><button class="btn primary" data-open="quality" type="button">Calidad academica</button><div class="avatar">ES</div></div>'
          bindings = "$('#themeBtn').addEventListener('click',toggleTheme);$('#densityBtn').addEventListener('click',toggleDensity);$('#presentBtn').addEventListener('click',togglePresenter);$('#printBtn').addEventListener('click',()=>window.print());$('#cmdBtn').addEventListener('click',openCmd);"
          if controls not in html or bindings not in html:
              raise SystemExit('No se encontraron los controles esperados; se cancela sin modificar.')
          html = html.replace(controls, '', 1).replace(bindings, '', 1)
          page.write_text(html, encoding='utf-8')
      - name: Save final page and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git rm .github/workflows/remove-top-controls.yml
          git commit -m "Remove top controls and retain accessibility panel"
          git push
      - name: Install dependencies
        run: npm install
      - name: Build published site
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: update-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
