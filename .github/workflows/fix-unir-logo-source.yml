name: Use existing UNIR logo asset

on:
  push:
    branches: [main]
    paths: [.github/workflows/fix-unir-logo-source.yml]

permissions:
  contents: write

jobs:
  update-logo-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reference existing GitHub Pages logo asset
        shell: python
        run: |
          from pathlib import Path
          page = Path('index.html')
          html = page.read_text(encoding='utf-8')
          old = 'https://investigacion.unir.net/wp-content/uploads/2019/05/Logo_UNIR_blanco.svg'
          new = 'https://carlosarandabcn-80.github.io/infografia-interactiva/assets/unir-logo.svg'
          if old not in html:
              raise SystemExit('No se encontro la referencia de logo esperada.')
          page.write_text(html.replace(old, new, 1), encoding='utf-8')
      - name: Commit logo source and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git rm .github/workflows/fix-unir-logo-source.yml
          git commit -m "Use existing UNIR logo asset from portfolio"
          git push
